<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METRO FOH - Procurement Tables</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .procurement-header {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .procurement-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .export-button {
      border: 0;
      border-radius: 8px;
      background: #14355a;
      color: #fff;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
      font-family: inherit;
    }

    .export-button:hover {
      background: #0d2846;
    }

    .station-block {
      margin-top: 22px;
    }

    .station-block h2 {
      margin: 0 0 10px;
      font-family: "Space Grotesk", sans-serif;
      color: #14355a;
    }

    .station-block .table-card {
      margin: 0;
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <div class="topbar-inner">
        <div class="brand">
          <div>METRO FOH</div>
        </div>
        <nav class="menu">
          <a href="index.html">Home</a>
          <a href="ldn.html">LDN</a>
          <a href="atl.html">ATL</a>
          <a href="aec.html">AEC</a>
          <a href="abp.html">ABP</a>
          <a href="product-specification.html">Product Specification</a>
        </nav>
      </div>
    </header>

    <section class="page-intro procurement-header">
      <div>
        <div class="eyebrow">Procurement Register</div>
        <h1 style="margin-top:14px;font-family:'Space Grotesk',sans-serif;">All Procurement Tables</h1>
        <p>Combined procurement data across LDN, ATL, AEC, and ABP.</p>
      </div>
      <div class="procurement-actions">
        <button class="export-button" type="button" id="exportCsv">Export CSV</button>
      </div>
    </section>

    <section class="section-panel" id="procurementTables"></section>

    <div class="footer-note">This file reads from dashboard-data.js.</div>
  </div>

  <script src="dashboard-data.js?v=3"></script>
  <script>
    const stations = ["LDN", "ATL", "AEC", "ABP"];
    const columns = ["Activity Description", "Lead Time (Days)", "Start Date", "Target Delivery Date", "Completion Date"];
    const fields = ["activityDescription", "leadTimeDays", "startDate", "targetDeliveryDate", "completionDate"];
    const data = window.DashboardData.stationData;

    const escapeHtml = (value) => String(value || "—")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");

    const renderTable = (station) => {
      const rows = data[station].procurement || [];
      return `
        <article class="station-block">
          <h2>${station}</h2>
          <div class="table-card">
            <h3>Procurement</h3>
            <p class="small-copy">${rows.length} tracked item${rows.length === 1 ? "" : "s"}</p>
            <div class="table-wrap">
              <table>
                <thead>
                  <tr>${columns.map((column) => `<th>${column}</th>`).join("")}</tr>
                </thead>
                <tbody>
                  ${rows.map((row) => `
                    <tr>
                      ${fields.map((field) => `<td>${escapeHtml(row[field])}</td>`).join("")}
                    </tr>
                  `).join("")}
                </tbody>
              </table>
            </div>
          </div>
        </article>
      `;
    };

    const csvEscape = (value) => `"${String(value || "").replace(/"/g, '""')}"`;

    const exportCsv = () => {
      const header = ["Station", ...columns];
      const lines = [header.map(csvEscape).join(",")];

      stations.forEach((station) => {
        (data[station].procurement || []).forEach((row) => {
          lines.push([station, ...fields.map((field) => row[field] || "")].map(csvEscape).join(","));
        });
      });

      const blob = new Blob([lines.join("\n")], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = "procurement-tables.csv";
      link.click();
      URL.revokeObjectURL(url);
    };

    document.getElementById("procurementTables").innerHTML = stations.map(renderTable).join("");
    document.getElementById("exportCsv").addEventListener("click", exportCsv);
  </script>
</body>
</html>
